services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nail_ai
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/workspace/data
      - ./命题三美甲评测数据（对外版）.xlsx:/workspace/命题三美甲评测数据（对外版）.xlsx

  ops-web:
    build:
      context: .
      dockerfile: apps/ops-web/Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
    ports:
      - "127.0.0.1:4173:4173"

volumes:
  postgres_data:
